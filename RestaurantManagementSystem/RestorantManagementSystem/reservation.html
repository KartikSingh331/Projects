<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Confirm Your table!</title>
    <link rel="stylesheet" href="reservation.css">
    <link rel="website icon" type="avif" href="logo.avif">

</head>

<body>
    <h1>Please fill this form to fix your table and confirm your order!</h1>
<form aciton ="order.html" name="myForm" onsubmit="return validateForm()" method="get" >
        <div class="formdesign" id="name">
            Name: <input type="text" name="fname" required><b><span class="formerror"> </span></b>
        </div>

        <div class="formdesign" id="email">
            Email: <input type="email" name="femail" required><b><span class="formerror"> </span></b>
        </div>

        <div class="formdesign" id="phone">
            Phone: <input type="phone" name="fphone" required><b><span class="formerror"></span></b>
        </div>
        <div class="formdesign" id="table" ><b><span class="formerror"></span></b>
            Table No:
            <select>
                    <option>Available Tables Are
                        <option>01</option><option>02</option> <option>03</option> <option>04</option>
                        <option>05</option><option>06</option> <option>07</option> <option>08</option>
                        <option>09</option>
                    </option>
                   </select>
        </div>
        <div class="formdesign" id="table" aria-required="table"><b><span class="formerror"></span></b>
            Table No:
            <select>
                    <option>Choose Dishes <option>Ice creame</option> <option>Chiken</option>
                        <option>Butter Panir</option> <option>Leetti Chokha</option><option>Aalu Paratha</option>
                        <option>Shahi Panir</option>
                        <option>French fri</option><option>Mango shek</option><option>Tanduri</option>
                    </option>
                   </select>
        </div>
        <div class="formdesign" id="pass">
            Password: <input type="password" name="fpass" required><b><span class="formerror"></span></b>
        </div>

        <div class="formdesign" id="cpass">
            Confirm Password: <input type="password" name="fcpass" required><b><span class="formerror"></span></b>
        </div>

       <a href="order.html"> 
        <input  class="but"  type="submit" value="Submit"></a>
       

    </form>
</body>
<script src="reservation.js"></script>

</html>
